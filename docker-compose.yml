services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'BingoTest123!'
    ports:
      - '1433:1433'
    healthcheck:
      test: ['CMD-SHELL', "bash -c 'echo > /dev/tcp/localhost/1433' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  db-init:
    build:
      context: .
      dockerfile: scripts/Dockerfile.dbinit
    depends_on:
      db:
        condition: service_healthy
    environment:
      SQL_CONNECTION_STRING: 'Server=tcp:db,1433;Initial Catalog=master;User ID=sa;Password=BingoTest123!;Encrypt=false;TrustServerCertificate=true;'
      SA_PASSWORD: 'BingoTest123!'
      DB_HOST: db
      DB_NAME: bingo_db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '7071:7071'
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SQL_CONNECTION_STRING: 'Server=tcp:db,1433;Initial Catalog=bingo_db;User ID=sa;Password=BingoTest123!;Encrypt=false;TrustServerCertificate=true;'
      ADMIN_KEY: 'smoke-test-admin-key'
      JWT_SECRET: 'smoke-test-jwt-secret-key-at-least-32-chars-long'
      ADMIN_EMAILS: 'admin@test.com'
      REDIS_CONNECTION_STRING: 'redis://redis:6379'
      ALLOWED_ORIGINS: 'http://localhost:8080,http://localhost:5173'
      ADMIN_COOKIE_SECURE: 'false'
      ADMIN_COOKIE_SAMESITE: 'Lax'
      NODE_ENV: 'development'
      SENTRY_DSN: '${SENTRY_DSN:-}'
      SENTRY_ENVIRONMENT: '${SENTRY_ENVIRONMENT:-local}'
      SENTRY_RELEASE: '${SENTRY_RELEASE:-}'
      SENTRY_TRACES_SAMPLE_RATE: '${SENTRY_TRACES_SAMPLE_RATE:-0.1}'
      SENTRY_ENABLE_LOGS: '${SENTRY_ENABLE_LOGS:-true}'
      SENTRY_CAPTURE_OPERATIONAL_ERRORS: '${SENTRY_CAPTURE_OPERATIONAL_ERRORS:-false}'
      SENTRY_FLUSH_TIMEOUT_MS: '${SENTRY_FLUSH_TIMEOUT_MS:-2000}'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: 'http://localhost:7071/api'
        VITE_SENTRY_DSN: '${VITE_SENTRY_DSN:-}'
        VITE_SENTRY_ENVIRONMENT: '${VITE_SENTRY_ENVIRONMENT:-local}'
        VITE_SENTRY_RELEASE: '${VITE_SENTRY_RELEASE:-}'
        VITE_SENTRY_TRACES_SAMPLE_RATE: '${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}'
        VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE: '${VITE_SENTRY_REPLAY_SESSION_SAMPLE_RATE:-0}'
        VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE: '${VITE_SENTRY_REPLAY_ERROR_SAMPLE_RATE:-1}'
        VITE_SENTRY_REPLAY_UNMASK: '${VITE_SENTRY_REPLAY_UNMASK:-false}'
        VITE_SENTRY_ENABLE_LOGS: '${VITE_SENTRY_ENABLE_LOGS:-true}'
        VITE_SENTRY_TRACE_PROPAGATION_TARGETS: '${VITE_SENTRY_TRACE_PROPAGATION_TARGETS:-http://localhost:7071}'
    ports:
      - '8080:80'
    depends_on:
      - backend
