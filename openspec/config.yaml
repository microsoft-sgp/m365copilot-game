schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:

context: |
  Backend:              Azure Functions v4 (TypeScript, Node.js runtime)
  Frontend:             Vue 3 with Tailwind CSS (TypeScript, Vite)
  Database:             Azure SQL Database
  Cache:                Redis (Azure Managed Redis in production, access key auth)
  Auth:                 JWT (access + refresh tokens, httpOnly cookies)
  API:                  RESTful, JSON responses
  Observability:        Sentry is the primary application observability layer for frontend/backend errors, logs, application metrics, traces, session replay, releases, and source maps using one Sentry project with service/runtime/environment/release tags.
  Azure Monitoring:     Application Insights remains the Azure Functions/App Service platform and runtime diagnostics layer for host diagnostics, invocation telemetry, platform health, and Azure Portal troubleshooting.
  Testing:              Vitest for unit tests, Playwright for e2e
  Style:                ESLint with Prettier, strict TypeScript

rules:
  proposal:
    - Include rollback plan
    - Identify affected teams
  specs:
    - Use Given/When/Then format for scenarios
  design:
    - Include sequence diagrams for complex flows
  tasks:
    - Add Vitest unit tests for new backend/frontend logic
    - Co-locate `*.test.js` files next to the code under test
    - Run `npm test` (Vitest) before marking a task complete

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
